<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
	src="https://cdn.jsdelivr.net/gh/xTracky/static@latest/utm-handler.js"
	data-token="89ef03cd-5b9a-4eea-9ab0-cd43faa8b91e"
>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// CAPTURA DE PARÂMETROS (ESPECIALMENTE sck)
// ==========================================

function getCampaignName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // PRIORIDADE: parâmetro 'sck' (o que você está usando)
  let sck = urlParams.get('sck');
  if (sck && sck !== '') {
    // Remove caracteres especiais e limita tamanho
    let campaign = sck.substring(0, 30);
    campaign = campaign.replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('🎯 Capturado via sck:', campaign);
    return campaign;
  }
  
  // Fallback: outros parâmetros comuns
  let cname = urlParams.get('cname');
  if (cname && cname !== '') return cname;
  
  let campaignId = urlParams.get('CampaignID');
  if (campaignId && campaignId !== '') return campaignId;
  
  let utmCampaign = urlParams.get('utm_campaign');
  if (utmCampaign && utmCampaign !== '') return utmCampaign;
  
  // Fallback padrão
  console.log('🎯 Usando fallback: pestykw');
  return 'pestykw';
}

function buildTelegramUrl() {
  const campaignName = getCampaignName();
  const baseUrl = "https://t.me/DaarkVazados1_bot";
  
  const url = new URL(baseUrl);
  url.searchParams.set('start', campaignName);
  
  console.log('🔗 URL do Telegram:', url.toString());
  console.log('📌 start=', campaignName);
  
  return url.toString();
}

function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildTelegramUrl();
    console.log('✅ Botão atualizado!');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildTelegramUrl();
      console.log('🖱️ Clique - start=', getCampaignName());
    });
  }
});

console.log('🚀 Página carregada');
console.log('📋 URL atual:', window.location.href);
console.log('📊 Parâmetro sck:', new URLSearchParams(window.location.search).get('sck'));
</script>
