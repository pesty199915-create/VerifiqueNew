<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
	src="https://cdn.jsdelivr.net/gh/xTracky/static@latest/utm-handler.js"
	data-token="89ef03cd-5b9a-4eea-9ab0-cd43faa8b91e"
>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// MOSTRA TODOS OS PARÂMETROS DA URL
// ==========================================

console.log('🚀 Página carregada');
console.log('📋 URL COMPLETA:', window.location.href);
console.log('📊 TODOS OS PARÂMETROS DA URL:');

const urlParams = new URLSearchParams(window.location.search);
const paramsList = [];

urlParams.forEach((value, key) => {
  console.log(`   ${key} = ${value}`);
  paramsList.push(`${key}=${value}`);
});

if (paramsList.length === 0) {
  console.log('   ⚠️ NENHUM PARÂMETRO ENCONTRADO!');
}

console.log('📌 Dica: Procure por parâmetros como: adname, CreativeID, ad, creative, utm_content, click_id');

// ==========================================
// CAPTURA DE PARÂMETROS DO CLOCKER
// ==========================================

function getAllParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const params = {};
  
  const paramKeys = [
    'CampaignID', 'CreativeID', 'kwai_click_id', 'cname', 'setname', 'adname',
    'siteid', 'lg', 'sys', 'idfa', 'os_name', 'gps_adid', 'ip_address', 
    'user_agent', 'device_name', 'xgo',
    'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'utm_id',
    'source', 'medium', 'campaign', 'term', 'content'
  ];
  
  paramKeys.forEach(key => {
    const value = urlParams.get(key);
    if (value && value !== '') {
      params[key] = value;
      if (params[key].startsWith('__') && params[key].endsWith('__')) {
        params[key] = '';
      }
    }
  });
  
  return params;
}

function getCampaignName() {
  const params = getAllParams();
  
  const possibleNames = [
    params.cname,
    params.CampaignID,
    params.campaign,
    params.utm_campaign,
    params.source,
    params.utm_source
  ];
  
  for (let i = 0; i < possibleNames.length; i++) {
    const name = possibleNames[i];
    if (name && name !== '' && !name.startsWith('__') && !name.endsWith('__')) {
      let campaign = name;
      campaign = campaign.substring(0, 30);
      campaign = campaign.replace(/[^a-zA-Z0-9_\-]/g, '_');
      console.log('🎯 Campanha detectada:', campaign);
      return campaign;
    }
  }
  
  console.log('🎯 Campanha fallback: pestykw');
  return 'pestykw';
}

function getCreativeName() {
  const params = getAllParams();
  
  // Tenta capturar de qualquer parâmetro que possa conter o nome do criativo
  const possibleNames = [
    params.adname,
    params.CreativeID,
    params.utm_content,
    params.term,
    params.content,
    params.kwai_click_id,
    params.ad,
    params.creative,
    params.ad_id
  ];
  
  for (let i = 0; i < possibleNames.length; i++) {
    const name = possibleNames[i];
    if (name && name !== '' && !name.startsWith('__') && !name.endsWith('__')) {
      let creative = name;
      creative = creative.substring(0, 30);
      creative = creative.replace(/[^a-zA-Z0-9_\-]/g, '_');
      console.log('🎯 Criativo detectado:', creative);
      return creative;
    }
  }
  
  console.log('🎯 Criativo fallback: nao_detectado');
  return 'nao_detectado';
}

function buildDestinationUrl() {
  const campaignName = getCampaignName();
  const creativeName = getCreativeName();
  
  const baseUrl = "https://eufacodineirocomhot.com/l/d0089464";
  
  const url = new URL(baseUrl);
  url.searchParams.set('shk', 'n455du82');
  
  // Envia campanha
  url.searchParams.set('cname', campaignName);
  url.searchParams.set('CampaignID', campaignName);
  url.searchParams.set('campaign', campaignName);
  url.searchParams.set('utm_campaign', campaignName);
  url.searchParams.set('source', campaignName);
  url.searchParams.set('codigo', campaignName);
  
  // Envia criativo
  url.searchParams.set('adname', creativeName);
  url.searchParams.set('creative', creativeName);
  url.searchParams.set('utm_content', creativeName);
  url.searchParams.set('start', creativeName);
  
  const urlParams = new URLSearchParams(window.location.search);
  
  const paramsToKeep = [
    'CampaignID', 'CreativeID', 'kwai_click_id', 'cname', 'setname', 'adname',
    'siteid', 'lg', 'sys', 'idfa', 'os_name', 'gps_adid', 'ip_address', 
    'user_agent', 'device_name', 'xgo',
    'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'utm_id',
    'source', 'medium', 'campaign', 'term', 'content',
    'fbclid', 'ttclid', 'gclid', 'msclkid'
  ];
  
  paramsToKeep.forEach(param => {
    const value = urlParams.get(param);
    if (value && value !== '' && !value.startsWith('__') && !value.endsWith('__')) {
      if (!['cname', 'CampaignID', 'campaign', 'utm_campaign', 'source', 'codigo', 'adname', 'creative', 'utm_content', 'start'].includes(param)) {
        url.searchParams.set(param, value);
      }
    }
  });
  
  console.log('🔗 URL FINAL:', url.toString());
  console.log('📌 Campanha enviada:', campaignName);
  console.log('📌 Criativo enviado:', creativeName);
  
  return url.toString();
}

function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildDestinationUrl();
    console.log('✅ Botão atualizado!');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildDestinationUrl();
    });
  }
});
</script>
