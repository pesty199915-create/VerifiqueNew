>
</script>
<meta charset="UTF-8">

<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// CAPTURA DE PARÂMETROS DO CLOCKER
// ==========================================

// Função para capturar TODOS os parâmetros da URL
function getAllParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const params = {};
  
  // Lista de parâmetros que o clocker pode enviar
  const paramKeys = [
    // Parâmetros do seu clocker
    'CampaignID', 'CreativeID', 'kwai_click_id', 'cname', 'setname', 'adname',
    'siteid', 'lg', 'sys', 'idfa', 'os_name', 'gps_adid', 'ip_address', 
    'user_agent', 'device_name', 'xgo',
    // UTMs padrão também (fallback)
    'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'utm_id'
  ];
  
  paramKeys.forEach(key => {
    const value = urlParams.get(key);
    if (value && value !== '') {
      params[key] = value;
      // Remove os placeholders __XXX__ se existirem
      if (params[key].startsWith('__') && params[key].endsWith('__')) {
        params[key] = '';
      }
    }
  });
  
  return params;
}

// Função que define o nome da campanha (prioridade: cname > CampaignID > utm_campaign > pestykw)
function getCampaignName() {
  const params = getAllParams();
  
  console.log('📊 Parâmetros detectados:', params);
  
  // Prioridade 1: cname (nome da campanha do clocker)
  if (params.cname && params.cname !== '' && !params.cname.startsWith('__')) {
    let campaign = params.cname;
    campaign = campaign.substring(0, 30);
    campaign = campaign.replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('🎯 Usando cname:', campaign);
    return campaign;
  }
  
  // Prioridade 2: CampaignID (ID da campanha)
  if (params.CampaignID && params.CampaignID !== '' && !params.CampaignID.startsWith('__')) {
    let campaign = params.CampaignID;
    campaign = campaign.substring(0, 30);
    console.log('🎯 Usando CampaignID:', campaign);
    return campaign;
  }
  
  // Prioridade 3: utm_campaign (fallback para UTMs padrão)
  if (params.utm_campaign && params.utm_campaign !== '') {
    let campaign = params.utm_campaign;
    campaign = campaign.substring(0, 30);
    campaign = campaign.replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('🎯 Usando utm_campaign:', campaign);
    return campaign;
  }
  
  // Prioridade 4: fallback padrão
  console.log('🎯 Usando fallback: pestykw');
  return 'pestykw';
}

// Função para construir a URL de destino com TODOS os parâmetros
function buildDestinationUrl() {
  const campaignName = getCampaignName();
  const baseUrl = "https://eufacodineirocomhot.com/l/d0089464";
  
  // Cria URL com o parâmetro shk fixo
  const url = new URL(baseUrl);
  url.searchParams.set('shk', 'n455du82');
  
  // Adiciona o nome da campanha
  url.searchParams.set('campaign', campaignName);
  url.searchParams.set('utm_campaign', campaignName);
  
  // Captura TODOS os parâmetros da URL atual e adiciona na URL de destino
  const urlParams = new URLSearchParams(window.location.search);
  
  // Lista completa de parâmetros que serão mantidos
  const paramsToKeep = [
    'CampaignID', 'CreativeID', 'kwai_click_id', 'cname', 'setname', 'adname',
    'siteid', 'lg', 'sys', 'idfa', 'os_name', 'gps_adid', 'ip_address', 
    'user_agent', 'device_name', 'xgo',
    'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'utm_id',
    'fbclid', 'ttclid', 'gclid', 'msclkid'
  ];
  
  paramsToKeep.forEach(param => {
    const value = urlParams.get(param);
    // Verifica se o valor existe e não é um placeholder vazio
    if (value && value !== '' && !value.startsWith('__') && !value.endsWith('__')) {
      url.searchParams.set(param, value);
    }
  });
  
  // Debug completo
  console.log('🔗 URL de destino final:', url.toString());
  console.log('📊 Todos os parâmetros capturados:', getAllParams());
  console.log('📌 Nome da campanha usado:', campaignName);
  
  return url.toString();
}

// Função que atualiza o link do botão
function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildDestinationUrl();
    console.log('✅ Botão atualizado com sucesso!');
  }
}

// Executa quando a página carregar
document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildDestinationUrl();
      console.log('🖱️ Clique registrado - Redirecionando...');
    });
  }
});

// Debug inicial
console.log('🚀 Página carregada');
console.log('📋 URL atual:', window.location.href);
console.log('📊 Parâmetros detectados:', getAllParams());
</script>
