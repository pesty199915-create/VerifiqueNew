<script
	src="https://cdn.jsdelivr.net/gh/xTracky/static@latest/utm-handler.js"

>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// CAPTURA DE PARÂMETROS - CAMPANHA e CRIATIVO
// ==========================================

// Captura o nome da CAMPANHA (vai para o campo "Campanha")
function getCampaignName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // Prioridade: cname > CampaignID > utm_campaign
  let cname = urlParams.get('cname');
  if (cname && cname !== '' && !cname.startsWith('__')) {
    return cleanParam(cname);
  }
  
  let campaignId = urlParams.get('CampaignID');
  if (campaignId && campaignId !== '' && !campaignId.startsWith('__')) {
    return cleanParam(campaignId);
  }
  
  let utmCampaign = urlParams.get('utm_campaign');
  if (utmCampaign && utmCampaign !== '') {
    return cleanParam(utmCampaign);
  }
  
  let sck = urlParams.get('sck');
  if (sck && sck !== '' && !sck.startsWith('__')) {
    return cleanParam(sck);
  }
  
  return 'pestykw';
}

// Captura o nome do CRIATIVO (vai para "Código de Vendas")
function getCreativeName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // Prioridade: adname > CreativeID > ad > utm_content
  let adname = urlParams.get('adname');
  if (adname && adname !== '' && !adname.startsWith('__')) {
    return cleanParam(adname);
  }
  
  let creativeId = urlParams.get('CreativeID');
  if (creativeId && creativeId !== '' && !creativeId.startsWith('__')) {
    return cleanParam(creativeId);
  }
  
  let ad = urlParams.get('ad');
  if (ad && ad !== '' && !ad.startsWith('__')) {
    return cleanParam(ad);
  }
  
  let utmContent = urlParams.get('utm_content');
  if (utmContent && utmContent !== '') {
    return cleanParam(utmContent);
  }
  
  return 'desconhecido';
}

function cleanParam(value) {
  let cleaned = value.substring(0, 40);
  cleaned = cleaned.replace(/[^a-zA-Z0-9_\-]/g, '_');
  return cleaned;
}

// Constrói a URL para o Telegram/Bot
function buildTelegramUrl() {
  const campaignName = getCampaignName();    // Ex: CBO_1-1-5
  const creativeName = getCreativeName();    // Ex: Video_Kwai_01
  
  const baseUrl = "https://t.me/DaarkVazados1_bot";
  const url = new URL(baseUrl);
  
  // O parâmetro start recebe o CRIATIVO (vai virar "Código de Vendas")
  url.searchParams.set('start', creativeName);
  
  // Mantém os parâmetros originais para debug
  const urlParams = new URLSearchParams(window.location.search);
  const paramsToKeep = ['sck', 'CampaignID', 'cname', 'utm_campaign', 'adname', 'CreativeID'];
  paramsToKeep.forEach(param => {
    const value = urlParams.get(param);
    if (value && value !== '' && !value.startsWith('__')) {
      url.searchParams.set(param, value);
    }
  });
  
  console.log('🔗 URL do Telegram:', url.toString());
  console.log('📌 CAMPANHA (Campanha):', campaignName);
  console.log('📌 CRIATIVO (Código de Vendas):', creativeName);
  console.log('📌 start =', creativeName);
  
  return url.toString();
}

function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildTelegramUrl();
    console.log('✅ Botão atualizado!');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildTelegramUrl();
    });
  }
});

console.log('🚀 Página carregada');
console.log('📋 URL atual:', window.location.href);

// Mostra todos os parâmetros recebidos
const allParams = new URLSearchParams(window.location.search);
console.log('📊 Parâmetros recebidos:');
for (let [key, value] of allParams) {
  console.log(`   ${key} = ${value}`);
}
</script>
