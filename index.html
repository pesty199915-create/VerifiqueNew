<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
	src="https://cdn.jsdelivr.net/gh/xTracky/static@latest/utm-handler.js"
	data-token="89ef03cd-5b9a-4eea-9ab0-cd43faa8b91e"
>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// CAPTURA DE PARÂMETROS - FOCO NO CRIATIVO
// ==========================================

// Captura o nome/número do CRIATIVO (anúncio) - PRIORIDADE MÁXIMA
function getCreativeName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // Lista de possíveis parâmetros que o Kwai/Clocker pode enviar para o criativo
  const possibleParams = [
    'adname',      // Nome do anúncio
    'CreativeID',  // ID do criativo
    'ad',          // Parâmetro ad genérico
    'ad_id',       // ID do anúncio
    'creative',    // Criativo
    'utm_content', // UTM Content (muitas vezes usado para criativo)
    'utm_term',    // UTM Term
    'setname'      // Nome do conjunto de anúncios
  ];
  
  for (let i = 0; i < possibleParams.length; i++) {
    const param = possibleParams[i];
    let value = urlParams.get(param);
    if (value && value !== '' && !value.startsWith('__')) {
      let cleaned = cleanParam(value);
      console.log(`🎯 Criativo capturado via ${param}:`, cleaned);
      return cleaned;
    }
  }
  
  // Se não encontrar, usar fallback com a data/hora para identificar
  const fallback = `criativo_${Date.now()}`;
  console.log('🎯 Nenhum criativo detectado, usando fallback:', fallback);
  return fallback;
}

// Função para limpar o parâmetro
function cleanParam(value) {
  let cleaned = value.substring(0, 40);
  cleaned = cleaned.replace(/[^a-zA-Z0-9_\-]/g, '_');
  return cleaned;
}

// Constrói a URL do Telegram com o CRIATIVO como start
function buildTelegramUrl() {
  const creativeName = getCreativeName();
  const baseUrl = "https://t.me/DaarkVazados1_bot";
  const url = new URL(baseUrl);
  
  // O parâmetro start será SOMENTE o nome do criativo
  url.searchParams.set('start', creativeName);
  
  // Opcional: Ainda mantém os parâmetros originais para debug
  const urlParams = new URLSearchParams(window.location.search);
  const paramsToKeep = ['sck', 'CampaignID', 'cname', 'utm_campaign', 'kwai_click_id'];
  paramsToKeep.forEach(param => {
    const value = urlParams.get(param);
    if (value && value !== '' && !value.startsWith('__')) {
      url.searchParams.set(param, value);
    }
  });
  
  console.log('🔗 URL do Telegram:', url.toString());
  console.log('📌 CRIATIVO (start):', creativeName);
  console.log('📊 URL original:', window.location.href);
  
  return url.toString();
}

function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildTelegramUrl();
    console.log('✅ Botão atualizado com o criativo!');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildTelegramUrl();
    });
  }
});

// Exibe todos os parâmetros recebidos para debug
console.log('🚀 Página carregada');
console.log('📋 URL atual:', window.location.href);
const allParams = new URLSearchParams(window.location.search);
console.log('📊 Todos os parâmetros recebidos:');
for (let [key, value] of allParams) {
  console.log(`   ${key} = ${value}`);
}
</script>
